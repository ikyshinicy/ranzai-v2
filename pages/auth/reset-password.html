<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — RanzAI</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/scripts/core/app.js"></script>


<link rel="stylesheet" href="/styles/main.css">
<link rel="stylesheet" href="/styles/pages/auth-reset-password.css">
</head>
<body>

<div class="mesh-bg"></div>
<div class="grid-bg"></div>

<div class="wrap" id="mainWrap" style="display:none;">

  <a href="https://ranz-ai.com" class="logo">
    <div class="logo-mark"><img src="/assets/icons/ranzai-logo.png" alt="RanzAI"/></div>
    <span class="logo-name">RanzAI</span>
  </a>

  <div class="card" id="formCard">
    <div class="card-body">

      <h1 class="card-title">Buat Password Baru</h1>
      <p class="card-sub">Masukkan password baru kamu. Minimal 6 karakter.</p>

      <div class="alert alert-error" id="alertError"></div>
      <div class="alert alert-success" id="alertSuccess"></div>

      <div class="field">
        <label class="field-label" for="passInput">Password Baru</label>
        <div class="field-wrap">
          <input class="field-input has-eye" type="password" id="passInput"
            placeholder="Min. 6 karakter"
            oninput="checkStrength(this.value)"
            onkeydown="if(event.key==='Enter')handleReset()"/>
          <button class="eye-btn" type="button" onclick="toggleEye('passInput','eyeIcon1')" title="Lihat password">
            <svg id="eyeIcon1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="field">
        <label class="field-label" for="confirmInput">Konfirmasi Password</label>
        <div class="field-wrap">
          <input class="field-input has-eye" type="password" id="confirmInput"
            placeholder="Ulangi password"
            onkeydown="if(event.key==='Enter')handleReset()"/>
          <button class="eye-btn" type="button" onclick="toggleEye('confirmInput','eyeIcon2')" title="Lihat password">
            <svg id="eyeIcon2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="submit-btn" type="button" id="submitBtn" onclick="handleReset()">
        <div class="spinner" id="spinner"></div>
        <span id="submitText">Simpan Password Baru</span>
      </button>

    </div>
  </div>

  <!-- State: token tidak valid -->
  <div class="card" id="invalidCard" style="display:none;">
    <div class="card-body">
      <div class="state-invalid">
        <div class="icon">🔗</div>
        <h2>Link Tidak Valid</h2>
        <p>Link reset password sudah kadaluarsa atau tidak valid. Silakan minta link baru dari halaman login.</p>
        <a href="/login" class="back-btn">← Kembali ke Login</a>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://ranz-ai.com">← Kembali ke RanzAI</a>
  </div>

</div>

<script src="/scripts/pages/auth-reset-password.js"></script>
</body>
</html>
